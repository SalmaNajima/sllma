* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    background: #f4f7fc;
    display: flex;
}

/* ================= SIDEBAR ================= */
.sidebar {
    width: 280px;
    height: 100vh;
    background: #2952cc;
    position: fixed;
    overflow-y: auto;
    color: white;
}

.logo {
    padding: 25px;
    text-align: center;
    border-bottom: 1px solid rgba(255,255,255,.2);
}

.logo h2 { font-size: 24px; margin-bottom: 5px; }
.logo p { font-size: 13px; opacity: .8; }

.menu { padding: 15px; }
.menu ul { list-style: none; }
.menu ul li { margin-bottom: 8px; }
.menu ul li a {
    display: block;
    padding: 12px 15px;
    text-decoration: none;
    color: white;
    border-radius: 10px;
    transition: .3s;
}
.menu ul li a:hover, .menu ul li a.active {
    background: rgba(255,255,255,.2);
}

/* ================= MAIN ================= */
.main {
    margin-left: 280px;
    width: calc(100% - 280px);
}

/* ================= TOPBAR ================= */
.topbar {
    background: white;
    padding: 18px 30px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    box-shadow: 0 2px 10px rgba(0,0,0,.08);
}
.topbar h2 { color: #2952cc; font-size: 20px; }

/* Tambahan Tombol Kembali Bergaya Sesuai Tema */
.btn-back {
    background: #6c757d;
    color: white;
    padding: 8px 15px;
    border: none;
    border-radius: 6px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    transition: 0.3s;
}
.btn-back:hover {
    background: #5a6268;
}

/* ================= CONTENT ================= */
.content { padding: 25px; }

.section-title {
    color: #2952cc;
    margin-bottom: 20px;
    font-size: 22px;
    border-bottom: 2px solid #2952cc;
    padding-bottom: 10px;
    display: inline-block;
}

/* ================= CARDS / LINKS ================= */
.grid-container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 20px;
    margin-bottom: 30px;
}

.data-card {
    background: white;
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0 4px 15px rgba(0,0,0,.05);
    border-top: 4px solid #2952cc;
}

.data-card h3 {
    margin-bottom: 15px;
    color: #333;
    font-size: 18px;
    display: flex;
    align-items: center;
    gap: 10px;
}

.data-card h3 i {
    color: #2952cc;
    font-size: 24px;
}

.btn-group {
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.btn {
    display: inline-block;
    padding: 10px 15px;
    background: #f0f4ff;
    color: #2952cc;
    text-decoration: none;
    border-radius: 8px;
    font-weight: 500;
    transition: 0.3s;
    border: 1px solid #d6e0ff;
    display: flex;
    align-items: center;
    gap: 10px;
}

.btn:hover {
    background: #2952cc;
    color: white;
}
